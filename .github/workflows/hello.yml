# This is workflow name
name: Hello
# runs on trigger
on:
  push:
    branches: [main]
# This are the jobs inside the workflow
jobs:
# This is the name of the job
  greet:
    # this is github runner, each job runs on a runner
    runs-on: ubuntu-latest
    steps:
      - name: say hello to user
        run: echo "Hello Dosto"
      - name: Say hello to user name
        run: echo "Hello $USER"
    
    
